[build]
  command = "npx prisma generate && node scripts/patch-prisma-esm.cjs && next build"
  publish = ".next"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# /studios → serves the Mudita Studios static page (in public/studios/)
[[redirects]]
  from   = "/studios"
  to     = "/studios/index.html"
  status = 200

# Environment variable notes for Netlify dashboard:
# DATABASE_URL        — Supabase pooler URL (port 6543, ?pgbouncer=true)
# ANTHROPIC_API_KEY   — Claude API key
# MILES_ANTHROPIC_API_KEY — Same key (used by pipeline agents)
# AUTH_SECRET         — NextAuth secret (also used as PIPELINE_SECRET fallback)
# NEXTAUTH_SECRET     — Same as AUTH_SECRET
# NEXT_PUBLIC_APP_URL — Your production URL (e.g. https://buildmudita.com)
#                       Used for pipeline background-function calls and email links.
#                       Do NOT set NEXTAUTH_URL — trustHost auto-detects it from the request,
#                       which lets the same deploy work on both the Netlify subdomain and
#                       any custom domain without CSRF mismatches.
# PIPELINE_SECRET     — Same as AUTH_SECRET (or a separate secret for internal auth)
# RESEND_API_KEY      — Optional, for email notifications
# EMAIL_FROM          — e.g. Miles <reports@mudita.com>
